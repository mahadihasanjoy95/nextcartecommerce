name: Backend CI/CD

on:
  push:
    branches: [ dev, master ]
    paths:
      - 'nextcart_backend/**'
  pull_request:
    branches: [ dev, master ]
    paths:
      - 'nextcart_backend/**'

jobs:
  # ─── Build & Test (runs on both dev and master push) ───────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip tests for now)
        working-directory: nextcart_backend
        run: mvn clean package -DskipTests

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextcart-backend-jar
          path: nextcart_backend/target/*.jar
          retention-days: 5

  # ─── Deploy to EC2 (only on master push) ───────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download JAR artifact
        uses: actions/download-artifact@v4
        with:
          name: nextcart-backend-jar
          path: ./artifact

      - name: Deploy JAR to EC2 via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./artifact/*.jar"
          target: "/home/ubuntu/nextcart/"
          strip_components: 1

      - name: Restart Spring Boot on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/nextcart
            # Rename artifact to fixed filename so systemd always picks up the latest JAR
            ls *.jar | grep -v nextcart-backend.jar | xargs -I{} mv {} nextcart-backend.jar 2>/dev/null || true

            sudo systemctl restart nextcart-backend
            sleep 5
            sudo systemctl status nextcart-backend
