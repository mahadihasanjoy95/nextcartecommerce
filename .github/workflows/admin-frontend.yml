name: Admin Frontend CI/CD

on:
  push:
    branches: [ dev, master ]
    paths:
      - 'nextcart_admin_frontend/**'
  pull_request:
    branches: [ dev, master ]
    paths:
      - 'nextcart_admin_frontend/**'

jobs:
  # ─── Build (runs on both dev and master) ────────────────────────────────────
  build:
    name: Build Admin Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: nextcart_admin_frontend/package-lock.json

      - name: Install dependencies
        working-directory: nextcart_admin_frontend
        run: npm ci

      - name: Build
        working-directory: nextcart_admin_frontend
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-frontend-dist
          path: nextcart_admin_frontend/dist/
          retention-days: 5

  # ─── Deploy to EC2 (only on master push) ────────────────────────────────────
  deploy:
    name: Deploy Admin Frontend to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: admin-frontend-dist
          path: ./dist

      - name: Copy dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "./dist/*"
          target: "/var/www/nextcart-admin/"
          strip_components: 1

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: sudo systemctl reload nginx
