<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Sign In With Google</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #f4f4f4; margin: 0; padding: 0;">
<table width="100%" cellpadding="0" cellspacing="0">
    <tr>
        <td align="center" style="padding: 40px 0;">
            <table width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                <tr>
                    <td style="background-color: #1a1a2e; padding: 32px; text-align: center;">
                        <h1 style="color: #ffffff; margin: 0; font-size: 24px;">NextCart</h1>
                    </td>
                </tr>
                <tr>
                    <td style="padding: 40px 32px;">
                        <h2 style="color: #1a1a2e; margin-top: 0;">Sign In With Google</h2>
                        <p style="color: #555; font-size: 16px;">Hi <span th:text="${firstName}">there</span>,</p>
                        <p style="color: #555; font-size: 16px;">Your NextCart account is linked to Google Sign-In. You don't have a password set — please use the "Continue with Google" button to sign in.</p>
                        <div style="text-align: center; margin: 32px 0;">
                            <a th:href="${loginUrl}" style="background-color: #1a1a2e; color: #ffffff; padding: 14px 28px; text-decoration: none; border-radius: 6px; font-size: 16px; display: inline-block;">Go to Login</a>
                        </div>
                        <p style="color: #999; font-size: 14px;">If you believe this is an error, please contact support.</p>
                    </td>
                </tr>
                <tr>
                    <td style="background-color: #f4f4f4; padding: 24px 32px; text-align: center;">
                        <p style="color: #aaa; font-size: 13px; margin: 0;">&copy; 2025 NextCart. All rights reserved.</p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
