spring.application.name=nextcart

server.port=8081

# Database — values injected via environment variables (IntelliJ run config locally, systemd EnvironmentFile on EC2)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/nextcart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Suppress noisy framework startup logs
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=WARN
logging.level.org.hibernate=WARN
logging.level.com.zaxxer.hikari=WARN

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.access-token-expiry-seconds=${JWT_ACCESS_EXPIRY:3600}
jwt.refresh-token-expiry-seconds=${JWT_REFRESH_EXPIRY:2592000}

# Super Admin Seed Configuration
app.seed.superadmin.email=${SUPERADMIN_EMAIL:superadmin@nextcart.com}
app.seed.superadmin.password=${SUPERADMIN_PASSWORD}
app.seed.superadmin.first-name=Super
app.seed.superadmin.last-name=Admin

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=30MB

# AWS S3
aws.region=${AWS_REGION:us-east-1}
aws.access-key=${AWS_ACCESS_KEY}
aws.secret-key=${AWS_SECRET_KEY}
aws.s3.bucket-name=${AWS_S3_BUCKET:nextcart-media}

# Storage
app.storage.base-url=${AWS_S3_BASE_URL:https://nextcart-media.s3.us-east-1.amazonaws.com/}
app.storage.profile-picture-prefix=profiles/
app.storage.product-thumbnail-prefix=products/thumbnails/
app.storage.product-gallery-prefix=products/gallery/

# Email (SMTP)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

app.mail.from=NextCart <${MAIL_USERNAME}>

# Frontend base URLs (used by email links and OAuth2 redirect)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
app.admin.url=${ADMIN_URL:http://localhost:3001}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
